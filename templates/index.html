<!DOCTYPE html>
<html>
<head>
    <title>AI Resume Analyzer</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

<div class="container mt-5">

    <div class="card p-4 shadow">

        <h2 class="text-center text-primary">AI Resume Analyzer</h2>

        <form action="/upload" method="POST" enctype="multipart/form-data">

            <input type="file" name="pdf_file" class="form-control mb-3" required>

            <textarea name="job_desc" class="form-control mb-3" rows="5"
            placeholder="Paste Job Description"></textarea>

            <button class="btn btn-primary w-100">Analyze</button>

        </form>

    </div>

</div>

</body>
</html>
